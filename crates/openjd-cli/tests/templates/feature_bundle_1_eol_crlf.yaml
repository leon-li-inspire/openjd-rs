specificationVersion: jobtemplate-2023-09
name: FB1 EndOfLine CRLF
extensions:
  - FEATURE_BUNDLE_1
steps:
  - name: EOLStep
    script:
      embeddedFiles:
        - name: TestFile
          type: TEXT
          filename: test_eol.txt
          data: "line1\nline2\nline3"
          endOfLine: CRLF
      actions:
        onRun:
          command: bash
          args: ["-c", "cat '{{Task.File.TestFile}}' | xxd"]
