specificationVersion: environment-2023-09
environment:
  name: EnvExitFail
  script:
    actions:
      onEnter:
        command: python
        args:
        - -c
        - print('EnvExitFail Enter')
      onExit:
        command: python
        args:
        - -c
        - import sys; print('EnvExitFail Exit'); sys.exit(1)
