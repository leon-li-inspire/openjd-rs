# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "warn"

[advisories]
version = 2

[sources]
unknown-registry = "deny"
unknown-git = "deny"
