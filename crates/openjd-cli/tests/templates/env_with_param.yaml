specificationVersion: environment-2023-09
parameterDefinitions:
  - name: EnvParam
    type: STRING
    default: DefaultForEnvParam
environment:
  name: EnvWithParam
  script:
    actions:
      onEnter:
        command: python
        args:
        - -c
        - print('EnvWithParam Enter {{Param.EnvParam}}')
      onExit:
        command: python
        args:
        - -c
        - print('EnvWithParam Exit {{Param.EnvParam}}')
