name: "PATH task parameter from LIST[PATH] job parameter (posix-to-win)"
description: "Verifies PATH task parameters derived from LIST[PATH] job parameter with posix-to-windows path mapping"

run_on: windows

job_template_file: "task_path_from_list_path_posix_to_win_template.yaml"

job_parameters:
  InputDirs:
    - "/mnt/projects/shot01"
    - "/mnt/projects/shot02"

path_mapping_rules:
  - source_path_format: posix
    source_path: "/mnt/projects"
    destination_path: "C:\\Projects"

expect:
  success: true
  output_contains:
    # First task - shot01/contents.json with path mapping
    - "Processing directory based on metadata"
    - 'Task.Param.MetadataFile=C:\Projects\shot01\contents.json'
    - 'Task.RawParam.MetadataFile=/mnt/projects/shot01/contents.json'
    - 'Task.Param.MetadataFile.parent=C:\Projects\shot01'
    - 'Task.RawParam.MetadataFile.upper=/MNT/PROJECTS/SHOT01/CONTENTS.JSON'
    # Second task
    - 'Task.Param.MetadataFile=C:\Projects\shot02\contents.json'
    - 'Task.RawParam.MetadataFile=/mnt/projects/shot02/contents.json'
    - 'Task.Param.MetadataFile.parent=C:\Projects\shot02'
    - 'Task.RawParam.MetadataFile.upper=/MNT/PROJECTS/SHOT02/CONTENTS.JSON'
