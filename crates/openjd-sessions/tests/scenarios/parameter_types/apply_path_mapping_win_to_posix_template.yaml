specificationVersion: jobtemplate-2023-09
name: apply_path_mapping Test
extensions:
  - EXPR
parameterDefinitions:
  - name: InputPath
    type: PATH
    default: "default/input/path"
steps:
  - name: TestApplyPathMapping
    script:
      actions:
        onRun:
          command: bash
          args:
            - "-c"
            - |
              echo 'Param.InputPath={{repr_json(Param.InputPath)}}'
              echo 'RawParam.InputPath={{repr_json(RawParam.InputPath)}}'
              echo 'apply_path_mapping(RawParam.InputPath)={{repr_json(apply_path_mapping(RawParam.InputPath))}}'
              echo 'RawParam.InputPath.apply_path_mapping()={{repr_json(RawParam.InputPath.apply_path_mapping())}}'
              echo 'Param.InputPath.parent={{repr_json(Param.InputPath.parent)}}'
              echo 'apply_path_mapping(RawParam.InputPath).parent={{repr_json(apply_path_mapping(RawParam.InputPath).parent)}}'
              echo 'Param.InputPath.name={{repr_json(Param.InputPath.name)}}'
              echo 'apply_path_mapping(RawParam.InputPath).name={{repr_json(apply_path_mapping(RawParam.InputPath).name)}}'
