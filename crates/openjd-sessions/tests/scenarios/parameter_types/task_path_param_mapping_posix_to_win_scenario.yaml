name: "PATH task parameter with posix-to-windows path mapping"
description: "Verifies PATH task parameters have posix-to-windows path mapping rules applied"

run_on: windows

job_template_file: "task_path_param_mapping_posix_to_win_template.yaml"

path_mapping_rules:
  - source_path_format: posix
    source_path: "/mnt/projects"
    destination_path: "C:\\Projects"

expect:
  success: true
  output_contains:
    # First task - path mapping applied to Task.Param, raw preserved in Task.RawParam
    - 'Task.Param.InputFile=C:\Projects\render\frame001.exr'
    - 'Task.RawParam.InputFile=/mnt/projects/render/frame001.exr'
    - 'Task.Param.InputFile.parent=C:\Projects\render'
    - 'Task.Param.InputFile.name=frame001.exr'
    - 'Task.RawParam.InputFile.upper=/MNT/PROJECTS/RENDER/FRAME001.EXR'
    # Second task
    - 'Task.Param.InputFile=C:\Projects\render\frame002.exr'
    - 'Task.RawParam.InputFile=/mnt/projects/render/frame002.exr'
    - 'Task.Param.InputFile.name=frame002.exr'
    - 'Task.RawParam.InputFile.upper=/MNT/PROJECTS/RENDER/FRAME002.EXR'
